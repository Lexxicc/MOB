<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HT HUD</title>
<style>
  /* Permafrost palette
     bg #010810  panel #061A2E  surface #0F2C50  primary #00BFFF
     accent #00E5FF  glow #EAFAFF  silver #A8B8C8  shadow #000508
     success #5b8727  danger #cc2529                                  */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
    user-select: none;
  }
  #panel {
    position: fixed;
    top: 8px;
    left: 8px;
    right: 8px;
    background: rgba(6, 26, 46, 0.94);
    border: 1px solid #00BFFF;
    border-radius: 6px;
    color: #EAFAFF;
    font-size: 12px;
    padding: 10px 12px;
    box-shadow: 0 6px 24px rgba(0, 5, 8, 0.85);
  }
  .title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    border-bottom: 1px solid #00BFFF;
    padding-bottom: 6px;
    -webkit-app-region: drag;
    cursor: move;
  }
  button { -webkit-app-region: no-drag; }
  .title .name {
    color: #00E5FF;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.08em;
  }
  .title .mode {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: #0F2C50;
    color: #EAFAFF;
  }
  .title .mode.live  { background: #5b8727; color: #EAFAFF; }
  .title .mode.paper { background: #00BFFF; color: #010810; }
  .row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    font-size: 11.5px;
  }
  .label { color: #A8B8C8; }
  .val   { color: #EAFAFF; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pnl-pos { color: #5b8727; font-weight: bold; }
  .pnl-neg { color: #cc2529; font-weight: bold; }
  .pnl-zero { color: #EAFAFF; }
  .pubkey { font-size: 10px; color: #A8B8C8; }
  .cb-ok    { color: #5b8727; }
  .cb-open  { color: #cc2529; font-weight: bold; }
  .recent-title {
    color: #A8B8C8;
    font-size: 10px;
    letter-spacing: 0.08em;
    margin: 8px 0 4px;
    border-top: 1px solid #00BFFF;
    padding-top: 6px;
  }
  .trade {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #A8B8C8;
    margin: 2px 0;
  }
  .trade .buy  { color: #5b8727; }
  .trade .sell { color: #cc2529; }
  .btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }
  button {
    background: #0F2C50;
    border: 1px solid #00BFFF;
    color: #EAFAFF;
    font-family: inherit;
    font-size: 11px;
    padding: 5px 4px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }
  button:hover { background: #00BFFF; color: #010810; border-color: #00E5FF; }
  #btn-kill {
    background: #cc2529;
    border-color: #cc2529;
    color: #EAFAFF;
    font-weight: bold;
  }
  #btn-kill:hover { background: #EAFAFF; color: #cc2529; border-color: #EAFAFF; }
  #btn-close {
    background: #0F2C50;
  }
  #conn {
    margin-top: 6px;
    text-align: right;
    font-size: 9px;
    color: #A8B8C8;
    letter-spacing: 0.05em;
  }
  #conn.ok    { color: #5b8727; }
  #conn.bad   { color: #cc2529; }
  #conn.dc-alert {
    color: #cc2529;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 0.08em;
    animation: dc-pulse 1s steps(1) infinite;
  }
  @keyframes dc-pulse { 50% { opacity: 0.45; } }
</style>
</head>
<body>
<div id="panel">
  <div class="title">
    <span class="name">HT HUD</span>
    <span id="mode" class="mode">--</span>
  </div>
  <div class="row"><span class="label">wallet</span><span class="val" id="wallet-sol">--</span></div>
  <div class="row"><span class="val pubkey" id="wallet-pubkey">--</span></div>
  <div class="row"><span class="label">cum PnL</span><span class="val pnl-zero" id="cum-pnl">$--</span></div>
  <div class="row"><span class="label">trades</span><span class="val" id="trade-count">--</span></div>
  <div class="row"><span class="label">daily loss</span><span class="val" id="daily-loss">-- SOL</span></div>
  <div class="row"><span class="label">CB</span><span class="val cb-ok" id="cb">closed</span></div>
  <div class="recent-title">RECENT TRADES</div>
  <div id="recent-list"></div>
  <div class="btns">
    <button id="btn-close">CLOSE HUD</button>
    <button id="btn-kill">KILL BOT</button>
  </div>
  <div id="conn">disconnected</div>
</div>
<script src="renderer.js"></script>
</body>
</html>
